<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание {{ current }}/{{ total }}</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 80px;">

    <h2>Задание {{ current }} из {{ total }}</h2>
    <p><strong>Очки:</strong> {{ score }}</p>

    <h1>{{ word_data.word }}</h1>

    <form method="post">
        {% for option in word_data.options %}
            <p>
                <label>
                    <input type="radio" name="answer" value="{{ option }}" required>
                    {{ option }}
                </label>
            </p>
        {% endfor %}

        <input type="hidden" name="correct" value="{{ word_data.correct }}">

        <button type="submit" style="padding: 10px 25px; font-size: 18px;">
            Ответить
        </button>
    </form>

</body>
</html>
